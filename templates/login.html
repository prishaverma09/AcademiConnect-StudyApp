<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AcademiConnect - Join</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts: Plus Jakarta Sans for trendy designs -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #0f172a; /* Dark sleek background */
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* Animated Mesh Gradients */
        .gradient-orb-1 {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(99,102,241,0.6) 0%, rgba(0,0,0,0) 70%);
            top: -100px;
            left: -100px;
            animation: float 8s ease-in-out infinite;
            z-index: 0;
        }
        .gradient-orb-2 {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(236,72,153,0.5) 0%, rgba(0,0,0,0) 70%);
            bottom: -200px;
            right: -100px;
            animation: float 10s ease-in-out infinite reverse;
            z-index: 0;
        }

        @keyframes float {
            0% { transform: translate(0, 0); }
            50% { transform: translate(30px, 50px); }
            100% { transform: translate(0, 0); }
        }

        /* Glassmorphism Card */
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 3rem 2.5rem;
            width: 100%;
            max-width: 450px;
            z-index: 10;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            color: white;
        }

        .form-control {
            background: rgba(255, 255, 255, 0.05) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: white !important;
            border-radius: 12px;
            padding: 0.8rem 1.2rem;
            transition: all 0.3s ease;
        }
        .form-control:focus {
            background: rgba(255, 255, 255, 0.1) !important;
            border-color: #6366f1 !important;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.25) !important;
            color: white !important;
        }
        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }
        select.form-control option {
            color: black;
        }

        .btn-neon {
            background: linear-gradient(135deg, #6366f1, #ec4899);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 0.8rem;
            font-weight: 700;
            font-size: 1.1rem;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-neon:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(236, 72, 153, 0.5);
            color: white;
        }

        .brand-icon {
            font-size: 2.5rem;
            background: -webkit-linear-gradient(#6366f1, #ec4899);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body>
    <div class="gradient-orb-1"></div>
    <div class="gradient-orb-2"></div>

    <div class="glass-card">
        <div class="text-center mb-4">
            <h1 class="brand-icon mb-2 fw-bolder">AcademiConnect</h1>
            <p class="text-white-50">Join the study hub.</p>
        </div>

        <form action="/signup" method="POST">
            <div class="mb-3">
                <label class="form-label small text-white-50 fw-bold">Name</label>
                <input type="text" class="form-control" name="name" placeholder="How should we call you?" required>
            </div>
            <div class="mb-3">
                <label class="form-label small text-white-50 fw-bold">Email</label>
                <input type="email" class="form-control" name="email" placeholder="Use your university email (.edu)" required>
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label small text-white-50 fw-bold">Age</label>
                    <input type="number" class="form-control" name="age" placeholder="e.g. 20" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label small text-white-50 fw-bold">Academic Year</label>
                    <select class="form-control" name="year" required>
                        <option value="" disabled selected>Select...</option>
                        <option value="First Year">First Year</option>
                        <option value="Second Year">Second Year</option>
                        <option value="Third Year">Third Year</option>
                        <option value="Fourth Year">Fourth Year</option>
                    </select>
                </div>
            </div>
            <div class="mb-4">
                <label class="form-label small text-white-50 fw-bold">College / University</label>
                <input type="text" class="form-control" name="college" placeholder="Where do you study?" required>
            </div>
            
            <button type="submit" class="btn btn-neon w-100">Create Account</button>
        </form>
    </div>
</body>
</html>
